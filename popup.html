<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workday Timesheet Helper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #f9fafb;
      width: 260px;
    }

    header {
      background: #0875e1;
      color: #fff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
    }

    header .icon {
      width: 28px;
      height: 28px;
      flex: 0 0 auto;
    }

    section {
      padding: 12px 14px;
    }

    h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      margin-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      text-align: left;
      padding: 4px 6px;
      background: #e8f0fe;
      color: #0875e1;
      font-weight: 600;
    }

    tbody tr:nth-child(even) { background: #f3f4f6; }

    td {
      padding: 4px 6px;
      border-bottom: 1px solid #e5e7eb;
    }

    footer {
      padding: 8px 14px;
      font-size: 11px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="13" r="7.5"></circle>
      <path d="M12 3.25v2.25"></path>
      <path d="M9.5 3.25h5"></path>
      <path d="M17.25 7.75l1.35-1.35"></path>
      <path d="M12 9.2v4.25"></path>
      <path d="M12 13.45l2.6 1.6"></path>
    </svg>
    <h1>Workday Timesheet Helper</h1>
  </header>

  <section>
    <h2>Hour Conversion Reference</h2>
    <table>
      <thead>
        <tr>
          <th>Old hrs</th>
          <th>New hrs (×0.95)</th>
          <th>Days</th>
        </tr>
      </thead>
      <tbody id="conversion-table"></tbody>
    </table>
  </section>

  <footer>v1.0.1 · Workday Timesheet Helper</footer>

  <script src="popup.js"></script>
</body>
</html>
