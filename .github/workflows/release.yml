name: Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Build
        id: build
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          version=$(node -p "require('./manifest.json').version")
          pkg_version=$(node -p "require('./package.json').version")
          [ "$version" = "$pkg_version" ] || { echo "::error::manifest/package version mismatch ($version vs $pkg_version)"; exit 1; }
          [ "$tag" = "v$version" ]         || { echo "::error::tag $tag does not match manifest version v$version"; exit 1; }
          node scripts/build-release.mjs
          echo "tag=v${version}"                                    >> "$GITHUB_OUTPUT"
          echo "asset=dist/workday-timesheet-helper-${version}.zip" >> "$GITHUB_OUTPUT"
          echo "notes=release-notes/v${version}.md"                 >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.build.outputs.tag }}"
          asset="${{ steps.build.outputs.asset }}"
          notes="${{ steps.build.outputs.notes }}"
          if [ -f "$notes" ]; then
            gh release create "$tag" "$asset" --title "$tag" --notes-file "$notes" --verify-tag 2>/dev/null \
              || gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" --title "$tag" --notes "Automated release build." --verify-tag 2>/dev/null \
              || gh release upload "$tag" "$asset" --clobber
          fi